# Safe placeholder values used when a contributor has not configured a Firebase project.
# Copy this file to firebase-web-config.properties and replace every value for a working web app.
applicationId=replace-with-firebase-web-app-id
apiKey=replace-with-firebase-web-api-key
projectId=replace-with-firebase-project-id
storageBucket=replace-with-firebase-storage-bucket
gcmSenderId=replace-with-firebase-sender-id
authDomain=replace-with-firebase-auth-domain
webClientId=replace-with-google-oauth-web-client-id
