name: 🧪 Tests
on:
  pull_request:
    branches:
      - 'main'

permissions:
  contents: read

jobs:
  build:
    # Never expose production credentials to pull_request workflows. Safe placeholder config keeps
    # the project buildable.
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - name: Setup Java
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          distribution: 'zulu'
          java-version: '21'
      - name: Scan tracked files for secrets
        run: scripts/check-secrets.sh
      - name: Run tests without production credentials
        env:
          CHROME_BIN: /usr/bin/google-chrome
        run: ./gradlew test :app:shared:jsBrowserTest :app:shared:wasmJsBrowserTest
